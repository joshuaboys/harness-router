<svg width="800" height="448" viewBox="0 0 800 448" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0D0D0F"/>
      <rect width="4" height="2" fill="#000000" opacity="0.30"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#17110B"/>
      <stop offset="60%" stop-color="#0D0D0F"/>
      <stop offset="100%" stop-color="#070708"/>
    </radialGradient>
  </defs>

  <rect width="800" height="448" fill="url(#vig)"/>

  <g font-family="Departure Mono" font-weight="400" text-anchor="middle" letter-spacing="-2">
    <text x="402" y="293" font-size="300" fill="#5E2800" filter="url(#glow)">hr.</text>
    <text x="400" y="290" font-size="300" fill="#CC5500" filter="url(#glow)">hr.</text>
    <text x="400" y="290" font-size="300" fill="#FF933F">hr.</text>
  </g>

  <rect width="800" height="448" fill="url(#scan)" opacity="0.5"/>
  <rect x="0.5" y="0.5" width="799" height="447" fill="none" stroke="#2A2A2E" stroke-width="1"/>
</svg>
